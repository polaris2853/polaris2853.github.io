<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<title>Class 3D Memorial | Void Alpha</title>
	<style>
		body {
			margin: 0;
			overflow: hidden;
			background: #000;
		}

		#crosshair {
			position: fixed;
			top: 50%;
			left: 50%;
			width: 10px;
			height: 10px;
			border: 2px solid #66edff; /* Your "Time" color */
			border-radius: 50%;
			transform: translate(-50%, -50%);
			pointer-events: none;
			z-index: 100;
		}

		#instructions {
			position: absolute;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.8);
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: monospace;
			cursor: pointer;
			z-index: 200;
		}
	</style>
</head>
<body>
	<div id="instructions">CLICK TO ENTER THE MEMORY VOID</div>
	<div id="crosshair"></div>

	<script type="importmap">
		{
			"imports": {
				"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
				"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
			}
		}
	</script>

	<script type="module" src="JS/3D.js"></script>
</body>
</html>
