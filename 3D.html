<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<title>27yx's Memories</title>
	<script type="importmap" crossorigin="anonymous">
		{
			"imports": {
				"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
				"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
			}
		}
	</script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style/style.css">
	<link rel="stylesheet" href="style/style_nav.css">
	<link rel="stylesheet" href="style/color.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
	<style>
		html, body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			width: 100%;
			height: 100%;
			touch-action: none;
		}

		#crosshair {
			position: fixed;
			top: 50%;
			left: 50%;
			width: 10px;
			height: 10px;
			border: 1px solid #000;
			border-radius: 50%;
			transform: translate(-50%, -50%);
			pointer-events: none;
			z-index: 100;
		}

		#instructions {
			position: absolute;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.8);
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: monospace;
			cursor: pointer;
			z-index: 200;
		}
	</style>
</head>
<body>
	<div id="instructions" style="z-index: 1999;">CLICK TO ENTER THE MEMORY VOID</div>
	<div id="crosshair"></div>
	<div id="joystick-zone" style="
		position: fixed;
		bottom: 50px;
		left: 50px;
		width: 150px;
		height: 150px;
		z-index: 1999;
		user-select: none;
		touch-action: none;"></div>


	<script type="module" src="JS/3D.js"></script>
</body>
</html>
